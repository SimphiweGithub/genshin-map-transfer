<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;height:100%;background:linear-gradient(160deg,rgba(59,66,92,0.92),rgba(37,42,64,0.94));border:1px solid rgba(211,188,142,0.45);border-radius:6px;box-shadow:0 8px 30px rgba(0,0,0,0.35),inset 0 0 40px rgba(20,24,40,0.4);display:flex;flex-direction:column;overflow:hidden">
  <div style="position:absolute;inset:3px;border:1px solid rgba(211,188,142,0.14);border-radius:4px;pointer-events:none"></div>
  <div style="position:absolute;top:5px;left:5px;width:12px;height:12px;border-top:1.5px solid #d3bc8e;border-left:1.5px solid #d3bc8e;opacity:0.85"></div>
  <div style="position:absolute;top:5px;right:5px;width:12px;height:12px;border-top:1.5px solid #d3bc8e;border-right:1.5px solid #d3bc8e;opacity:0.85"></div>
  <div style="position:absolute;bottom:5px;left:5px;width:12px;height:12px;border-bottom:1.5px solid #d3bc8e;border-left:1.5px solid #d3bc8e;opacity:0.85"></div>
  <div style="position:absolute;bottom:5px;right:5px;width:12px;height:12px;border-bottom:1.5px solid #d3bc8e;border-right:1.5px solid #d3bc8e;opacity:0.85"></div>
  <sc-if value="{{ hasTitle }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;align-items:center;gap:9px;padding:13px 16px 11px;border-bottom:1px solid rgba(211,188,142,0.22)">
      <div style="width:9px;height:9px;background:{{ accent }};transform:rotate(45deg);box-shadow:0 0 8px {{ accent }};flex:none"></div>
      <div style="font-family:'Cinzel',serif;font-weight:600;font-size:15px;letter-spacing:1.5px;color:#ece5d8;text-transform:uppercase">{{ title }}</div>
      <div style="flex:1;height:1px;background:linear-gradient(90deg,rgba(211,188,142,0.4),transparent)"></div>
      <sc-if value="{{ badge }}" hint-placeholder-val="hi">
        <div style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;color:#d3bc8e">{{ badge }}</div>
      </sc-if>
    </div>
  </sc-if>
  <div style="flex:1;padding:16px;min-height:0">{{ children }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:220},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Panel&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#d3bc8e&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      hasTitle: !!this.props.title,
      title: this.props.title,
      accent: this.props.accent || '#d3bc8e',
      badge: this.props.badge || '',
      children: this.props.children,
    };
  }
}
</script>
</body>
</html>
